<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bead It</title>
<script src="https://cdn.jsdelivr.net/npm/opentype.js@1.3.4/dist/opentype.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #f5f2ee; overflow: hidden; font-family: sans-serif; }
canvas { display: block; }
#ui {
  position: fixed; top: 20px; left: 50%;
  transform: translateX(-50%);
  display: flex; flex-direction: column; gap: 10px;
  align-items: center;
  background: rgba(255,255,255,0.82);
  backdrop-filter: blur(14px);
  border: 1px solid rgba(0,0,0,0.08);
  border-radius: 16px;
  padding: 16px 20px;
  min-width: 280px;
  z-index: 100;
}
#ui input[type=text] {
  background: rgba(0,0,0,0.04); border: 1px solid rgba(0,0,0,0.12);
  color: #333; padding: 8px 12px; border-radius: 8px; font-size: 18px;
  width: 220px; outline: none; text-align: center; letter-spacing: 4px;
}
.row { display: flex; align-items: center; gap: 8px; color: rgba(0,0,0,0.4); font-size: 12px; width: 100%; }
.row input[type=range] { flex: 1; accent-color: #888; }
select { background: #fff; color: #333; border: 1px solid rgba(0,0,0,0.15); padding: 4px 8px; border-radius: 6px; font-size: 12px; }
button { background: rgba(0,0,0,0.05); border: 1px solid rgba(0,0,0,0.12); color: #333; padding: 7px 14px; border-radius: 8px; cursor: pointer; font-size: 12px; }
button:hover { background: rgba(0,0,0,0.1); }
.btn-row { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
#hint { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); color: rgba(0,0,0,0.22); font-size: 12px; pointer-events: none; }
#font-name { color: rgba(0,0,0,0.3); font-size: 11px; }
#warn { color: #c0392b; font-size: 11px; display: none; }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="ui">
  <input type="text" id="txt" value="BEAD" maxlength="8">
  <div class="row">
    <span>size</span>
    <input type="range" id="sl-size" min="8" max="48" value="18">
    <span id="vl-size">18</span>
  </div>
  <div class="row">
    <span>density</span>
    <input type="range" id="sl-density" min="1" max="10" value="5">
    <span id="vl-density">5</span>
  </div>
  <div class="row">
    <span>jitter</span>
    <input type="range" id="sl-jitter" min="0" max="14" value="4">
    <span id="vl-jitter">4</span>
  </div>
  <div class="row">
    <span>palette</span>
    <select id="sel-palette">
      <option value="candy">candy</option>
      <option value="crystal">crystal</option>
      <option value="rose">rose</option>
      <option value="mint">mint</option>
      <option value="sky">sky</option>
      <option value="mono">mono</option>
    </select>
    <span>shape</span>
    <select id="sel-shape">
      <option value="mix">mix</option>
      <option value="diamond">diamond</option>
      <option value="emerald">emerald</option>
      <option value="heart">heart</option>
      <option value="round">round</option>
    </select>
  </div>
  <div class="btn-row">
    <button id="btn-reset">reset</button>
    <button id="btn-phys">physics ●</button>
    <button id="btn-export">save</button>
    <button id="btn-font">font</button>
    <input type="file" id="font-upload" accept=".ttf,.otf,.woff,.woff2" style="display:none">
  </div>
  <div id="warn">⚠ too many gems — increase size or lower density</div>
  <div id="font-name"></div>
</div>
<div id="hint">click to shake · tilt to roll</div>
<script>
const FONT_URL = 'https://cdn.jsdelivr.net/npm/@fontsource/inter@5.0.8/files/inter-latin-900-normal.woff';
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H, font = null, seed = 42, animId = null, physicsOn = true;

// low-sat candy/crystal palettes
const PALETTES = {
  candy:   () => { const h=[0,30,60,180,220,280,320][Math.floor(Math.random()*7)]; return {h, s:38+Math.random()*18, l:68+Math.random()*14}; },
  crystal: () => { const h=Math.random()*360; return {h, s:20+Math.random()*20, l:75+Math.random()*12}; },
  rose:    () => { const h=330+Math.random()*40; return {h, s:35+Math.random()*20, l:68+Math.random()*14}; },
  mint:    () => { const h=150+Math.random()*40; return {h, s:30+Math.random()*20, l:68+Math.random()*14}; },
  sky:     () => { const h=190+Math.random()*50; return {h, s:35+Math.random()*20, l:68+Math.random()*14}; },
  mono:    () => { const h=220; return {h, s:10+Math.random()*15, l:65+Math.random()*20}; }
};

function sr(s) { const x=Math.sin(s+1)*43758.5453; return x-Math.floor(x); }

function resize() { W=canvas.width=window.innerWidth; H=canvas.height=window.innerHeight; rebuild(); }
window.addEventListener('resize', resize);

function rasterize(text) {
  const ofc=document.createElement('canvas'); ofc.width=W; ofc.height=H;
  const oc=ofc.getContext('2d');
  const chars=Math.max(text.length,1);
  if (font) {
    let fs=Math.min(W*0.82/chars*1.5,H*0.62);
    const path=font.getPath(text,0,0,fs);
    const bb=path.getBoundingBox();
    const sc=Math.min((W*0.88)/(bb.x2-bb.x1),(H*0.65)/(bb.y2-bb.y1));
    fs*=sc;
    const p2=font.getPath(text,0,0,fs);
    const bb2=p2.getBoundingBox();
    const ox=(W-(bb2.x2-bb2.x1))/2-bb2.x1;
    const oy=(H-(bb2.y2-bb2.y1))/2-bb2.y1;
    const d=p2.commands.reduce((s,c)=>{
      if(c.type==='M') return s+`M${c.x+ox},${c.y+oy}`;
      if(c.type==='L') return s+`L${c.x+ox},${c.y+oy}`;
      if(c.type==='C') return s+`C${c.x1+ox},${c.y1+oy},${c.x2+ox},${c.y2+oy},${c.x+ox},${c.y+oy}`;
      if(c.type==='Q') return s+`Q${c.x1+ox},${c.y1+oy},${c.x+ox},${c.y+oy}`;
      if(c.type==='Z') return s+'Z'; return s;
    },'');
    oc.fillStyle='#fff'; oc.fill(new Path2D(d));
  } else {
    const fs=Math.min(W*0.75/chars*1.4,H*0.6);
    oc.font=`900 ${fs}px Arial Black,Arial,sans-serif`;
    oc.textAlign='center'; oc.textBaseline='middle';
    oc.fillStyle='#fff'; oc.fillText(text,W/2,H/2);
  }
  return oc.getImageData(0,0,W,H);
}

function extractSkeleton(imgData, spacing) {
  const SW=imgData.width,SH=imgData.height,SC=2;
  const w=Math.ceil(SW/SC),h=Math.ceil(SH/SC);
  const data=imgData.data;
  const grid=new Uint8Array(w*h);
  for(let y=0;y<h;y++) for(let x=0;x<w;x++){
    const sx=Math.min(x*SC,SW-1),sy=Math.min(y*SC,SH-1);
    grid[y*w+x]=data[(sy*SW+sx)*4+3]>128?1:0;
  }
  function nb(x,y){return(x<0||y<0||x>=w||y>=h)?0:grid[y*w+x];}
  let changed=true;
  while(changed){
    changed=false;
    for(let pass=0;pass<2;pass++){
      const rem=[];
      for(let y=1;y<h-1;y++) for(let x=1;x<w-1;x++){
        if(!grid[y*w+x]) continue;
        const p2=nb(x,y-1),p3=nb(x+1,y-1),p4=nb(x+1,y),p5=nb(x+1,y+1),
              p6=nb(x,y+1),p7=nb(x-1,y+1),p8=nb(x-1,y),p9=nb(x-1,y-1);
        const B=p2+p3+p4+p5+p6+p7+p8+p9;
        if(B<2||B>6) continue;
        const A=(p2===0&&p3===1?1:0)+(p3===0&&p4===1?1:0)+(p4===0&&p5===1?1:0)+
                (p5===0&&p6===1?1:0)+(p6===0&&p7===1?1:0)+(p7===0&&p8===1?1:0)+
                (p8===0&&p9===1?1:0)+(p9===0&&p2===1?1:0);
        if(A!==1) continue;
        if(pass===0){if(p2*p4*p6!==0||p4*p6*p8!==0) continue;}
        else        {if(p2*p4*p8!==0||p2*p6*p8!==0) continue;}
        rem.push(y*w+x);
      }
      if(rem.length){changed=true;rem.forEach(i=>{grid[i]=0;});}
    }
  }
  const sp=Math.max(1,Math.round(spacing/SC));
  const pts=[];
  const used=new Uint8Array(w*h);
  for(let y=0;y<h;y++) for(let x=0;x<w;x++){
    if(!grid[y*w+x]||used[y*w+x]) continue;
    pts.push({x:x*SC+SC/2,y:y*SC+SC/2});
    for(let dy=-sp;dy<=sp;dy++) for(let dx=-sp;dx<=sp;dx++){
      const nx=x+dx,ny=y+dy;
      if(nx>=0&&ny>=0&&nx<w&&ny<h&&dx*dx+dy*dy<=sp*sp) used[ny*w+nx]=1;
    }
  }
  return pts;
}

let beads=[];
let gx=0,gy=0.32;
window.addEventListener('devicemotion',e=>{
  const a=e.accelerationIncludingGravity; if(!a) return;
  gx=(a.x||0)*0.04; gy=-(a.y||0)*0.04;
});

function rebuild() {
  if(animId){cancelAnimationFrame(animId);animId=null;}
  const text    = document.getElementById('txt').value||'BEAD';
  const beadR   = parseInt(document.getElementById('sl-size').value);
  const density = parseInt(document.getElementById('sl-density').value);
  const jitter  = parseInt(document.getElementById('sl-jitter').value);
  const palette = document.getElementById('sel-palette').value;
  const shape   = document.getElementById('sel-shape').value;
  const spacing = Math.max(beadR*2, beadR*(3.0-density*0.18));
  const imgData = rasterize(text);
  const pts = extractSkeleton(imgData, spacing);
  document.getElementById('warn').style.display=pts.length>300?'block':'none';
  const shapes=['diamond','emerald','heart','round','diamond','emerald'];
  beads=pts.map((p,i)=>{
    const angle=sr(seed+i*3)*Math.PI*2;
    const dist=sr(seed+i*3+1)*jitter;
    const rot=sr(seed+i*7)*Math.PI*2;
    const col=PALETTES[palette]();
    const sh=shape==='mix'?shapes[Math.floor(sr(seed+i*11)*shapes.length)]:shape;
    return {x:p.x+Math.cos(angle)*dist, y:p.y+Math.sin(angle)*dist,
            ox:p.x, oy:p.y, vx:0, vy:0, r:beadR, h:col.h, s:col.s, l:col.l, rot, shape:sh};
  });
  if(physicsOn) startPhysics(); else render();
}

function startPhysics() {
  if(animId) cancelAnimationFrame(animId);
  function tick(){
    const damp=0.80,rest=0.010,bounce=0.42;
    for(const b of beads){
      b.vx+=gx+(b.ox-b.x)*rest; b.vy+=gy+(b.oy-b.y)*rest;
      b.vx*=damp; b.vy*=damp; b.x+=b.vx; b.y+=b.vy;
      if(b.x-b.r<0){b.x=b.r;b.vx*=-bounce;}
      if(b.x+b.r>W){b.x=W-b.r;b.vx*=-bounce;}
      if(b.y-b.r<0){b.y=b.r;b.vy*=-bounce;}
      if(b.y+b.r>H){b.y=H-b.r;b.vy*=-bounce;}
    }
    for(let i=0;i<beads.length;i++) for(let j=i+1;j<beads.length;j++){
      const a=beads[i],b=beads[j];
      const dx=b.x-a.x,dy=b.y-a.y,minD=(a.r+b.r)*0.9;
      const d2=dx*dx+dy*dy;
      if(d2<minD*minD&&d2>0.001){
        const d=Math.sqrt(d2),push=(minD-d)*0.22/d;
        a.vx-=dx*push;a.vy-=dy*push;b.vx+=dx*push;b.vy+=dy*push;
      }
    }
    render();
    animId=requestAnimationFrame(tick);
  }
  animId=requestAnimationFrame(tick);
}

// ── gem face helper ───────────────────────────────────────
function faceLightness(nx, ny, l) {
  // top light at (0,-1), brighter faces facing up
  const dot = -ny; // dot with (0,-1)
  return Math.max(0, Math.min(100, l + dot * 28));
}

function drawFace(pts, h, s, l, alpha) {
  ctx.beginPath();
  ctx.moveTo(pts[0][0], pts[0][1]);
  for(let i=1;i<pts.length;i++) ctx.lineTo(pts[i][0],pts[i][1]);
  ctx.closePath();
  ctx.fillStyle=`hsla(${h},${s}%,${l}%,${alpha})`;
  ctx.fill();
  ctx.strokeStyle=`hsla(${h},${s-10}%,${l-15}%,0.25)`;
  ctx.lineWidth=0.5; ctx.stroke();
}

// ── diamond (brilliant cut) ───────────────────────────────
function drawDiamond(x,y,r,b) {
  ctx.save(); ctx.translate(x,y); ctx.rotate(b.rot);
  const h=b.h,s=b.s,l=b.l;
  // drop shadow
  ctx.shadowColor='rgba(0,0,0,0.18)'; ctx.shadowBlur=r*0.8; ctx.shadowOffsetY=r*0.4;
  // table (top flat face)
  const tw=r*0.55;
  drawFace([[-tw,-r*0.15],[tw,-r*0.15],[tw*0.7,-r*0.85],[-tw*0.7,-r*0.85]],h,s,faceLightness(0,-1,l),0.92);
  ctx.shadowColor='transparent'; ctx.shadowBlur=0; ctx.shadowOffsetY=0;
  // upper girdle faces
  const gpts=[[-tw,-r*0.15],[tw,-r*0.15],[r,r*0.1],[-r,r*0.1]];
  drawFace(gpts,h,s,faceLightness(0,-0.5,l),0.85);
  // left upper
  drawFace([[-r,r*0.1],[-tw,-r*0.15],[-tw*0.7,-r*0.85],[-r*0.5,-r*0.5]],h,s,faceLightness(-1,-0.3,l),0.78);
  // right upper
  drawFace([[r,r*0.1],[tw,-r*0.15],[tw*0.7,-r*0.85],[r*0.5,-r*0.5]],h,s,faceLightness(1,-0.3,l),0.65);
  // lower pavilion faces
  drawFace([[-r,r*0.1],[0,r*1.25],[r,r*0.1]],h,s,faceLightness(0,0.8,l),0.72);
  drawFace([[-r,r*0.1],[0,r*1.25],[-r*0.5,r*0.7]],h,s,faceLightness(-0.7,0.7,l),0.82);
  drawFace([[r,r*0.1],[0,r*1.25],[r*0.5,r*0.7]],h,s,faceLightness(0.7,0.7,l),0.60);
  // specular
  ctx.beginPath(); ctx.arc(-tw*0.3,-r*0.55,r*0.1,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0.85)'; ctx.fill();
  ctx.restore();
}

// ── emerald cut (stepped rectangle) ──────────────────────
function drawEmerald(x,y,r,b) {
  ctx.save(); ctx.translate(x,y); ctx.rotate(b.rot);
  const h=b.h,s=b.s,l=b.l;
  const W2=r*1.1,H2=r*0.75,ch=r*0.22; // chamfer
  ctx.shadowColor='rgba(0,0,0,0.16)'; ctx.shadowBlur=r*0.7; ctx.shadowOffsetY=r*0.35;
  // table
  const tW=W2*0.6,tH=H2*0.55;
  drawFace([[-tW,-tH],[tW,-tH],[tW,tH],[-tW,tH]],h,s,faceLightness(0,-1,l),0.92);
  ctx.shadowColor='transparent'; ctx.shadowBlur=0; ctx.shadowOffsetY=0;
  // top step
  drawFace([[-tW,-tH],[tW,-tH],[W2-ch,-H2],[-W2+ch,-H2]],h,s,faceLightness(0,-0.8,l),0.80);
  // bottom step
  drawFace([[-tW,tH],[tW,tH],[W2-ch,H2],[-W2+ch,H2]],h,s,faceLightness(0,0.8,l),0.55);
  // left step
  drawFace([[-tW,-tH],[-tW,tH],[-W2+ch,H2],[-W2+ch,-H2]],h,s,faceLightness(-1,0,l),0.75);
  // right step
  drawFace([[tW,-tH],[tW,tH],[W2-ch,H2],[W2-ch,-H2]],h,s,faceLightness(1,0,l),0.50);
  // corner chamfers
  drawFace([[-W2+ch,-H2],[-tW,-tH],[-W2,-H2+ch]],h,s,l-5,0.65);
  drawFace([[W2-ch,-H2],[tW,-tH],[W2,-H2+ch]],h,s,l-8,0.60);
  drawFace([[-W2+ch,H2],[-tW,tH],[-W2,H2-ch]],h,s,l-10,0.55);
  drawFace([[W2-ch,H2],[tW,tH],[W2,H2-ch]],h,s,l-12,0.50);
  // specular line
  ctx.beginPath(); ctx.moveTo(-tW*0.6,-tH*0.7); ctx.lineTo(tW*0.6,-tH*0.7);
  ctx.strokeStyle='rgba(255,255,255,0.7)'; ctx.lineWidth=r*0.08; ctx.stroke();
  ctx.restore();
}

// ── heart ─────────────────────────────────────────────────
function drawHeart(x,y,r,b) {
  ctx.save(); ctx.translate(x,y); ctx.rotate(b.rot);
  const h=b.h,s=b.s,l=b.l;
  ctx.shadowColor='rgba(0,0,0,0.16)'; ctx.shadowBlur=r*0.7; ctx.shadowOffsetY=r*0.35;
  // main heart shape
  ctx.beginPath();
  ctx.moveTo(0,r*0.35);
  ctx.bezierCurveTo(-r*1.1,r*0.35,-r*1.1,-r*0.55,-r*0.55,-r*0.55);
  ctx.bezierCurveTo(-r*0.1,-r*0.55,0,-r*0.1,0,-r*0.1);
  ctx.bezierCurveTo(0,-r*0.1,r*0.1,-r*0.55,r*0.55,-r*0.55);
  ctx.bezierCurveTo(r*1.1,-r*0.55,r*1.1,r*0.35,0,r*0.35);
  ctx.closePath();
  const g=ctx.createLinearGradient(0,-r*0.6,0,r*0.4);
  g.addColorStop(0,`hsl(${h},${s}%,${Math.min(100,l+20)}%)`);
  g.addColorStop(0.5,`hsl(${h},${s}%,${l}%)`);
  g.addColorStop(1,`hsl(${h},${s}%,${Math.max(0,l-18)}%)`);
  ctx.fillStyle=g; ctx.fill();
  ctx.shadowColor='transparent'; ctx.shadowBlur=0; ctx.shadowOffsetY=0;
  // cleft highlight
  ctx.beginPath(); ctx.arc(-r*0.28,-r*0.42,r*0.18,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0.72)'; ctx.fill();
  ctx.beginPath(); ctx.arc(r*0.28,-r*0.42,r*0.12,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0.45)'; ctx.fill();
  ctx.restore();
}

// ── round brilliant ───────────────────────────────────────
function drawRound(x,y,r,b) {
  ctx.save(); ctx.translate(x,y);
  const h=b.h,s=b.s,l=b.l;
  const N=16; // facets
  ctx.shadowColor='rgba(0,0,0,0.16)'; ctx.shadowBlur=r*0.7; ctx.shadowOffsetY=r*0.35;
  // draw facets
  for(let i=0;i<N;i++){
    const a0=(i/N)*Math.PI*2, a1=((i+1)/N)*Math.PI*2, am=(a0+a1)/2;
    const nx=Math.cos(am), ny=Math.sin(am);
    const fl=faceLightness(nx,ny,l);
    const inner=r*0.38;
    ctx.beginPath();
    ctx.moveTo(Math.cos(a0)*r,Math.sin(a0)*r);
    ctx.lineTo(Math.cos(a1)*r,Math.sin(a1)*r);
    ctx.lineTo(Math.cos(am)*inner,Math.sin(am)*inner);
    ctx.closePath();
    ctx.fillStyle=`hsl(${h},${s}%,${fl}%)`;
    ctx.fill();
    ctx.strokeStyle=`hsla(${h},${s}%,${fl-15}%,0.3)`;
    ctx.lineWidth=0.4; ctx.stroke();
  }
  ctx.shadowColor='transparent'; ctx.shadowBlur=0; ctx.shadowOffsetY=0;
  // table circle
  ctx.beginPath(); ctx.arc(0,0,r*0.38,0,Math.PI*2);
  ctx.fillStyle=`hsl(${h},${s}%,${Math.min(100,l+22)}%)`;
  ctx.fill();
  // specular
  ctx.beginPath(); ctx.arc(-r*0.22,-r*0.22,r*0.14,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0.82)'; ctx.fill();
  ctx.restore();
}

function render() {
  ctx.fillStyle='#f5f2ee'; ctx.fillRect(0,0,W,H);
  for(const b of beads){
    if(b.shape==='diamond')  drawDiamond(b.x,b.y,b.r,b);
    else if(b.shape==='emerald') drawEmerald(b.x,b.y,b.r,b);
    else if(b.shape==='heart')   drawHeart(b.x,b.y,b.r,b);
    else if(b.shape==='round')   drawRound(b.x,b.y,b.r,b);
  }
}

function shake() { beads.forEach(b=>{b.vx+=(Math.random()-0.5)*14;b.vy+=(Math.random()-0.5)*14;}); }
function exportPNG() { const a=document.createElement('a');a.download='beadit.png';a.href=canvas.toDataURL('image/png');a.click(); }

document.getElementById('txt').addEventListener('input',rebuild);
[['sl-size','vl-size'],['sl-density','vl-density'],['sl-jitter','vl-jitter']].forEach(([sid,vid])=>{
  document.getElementById(sid).addEventListener('input',function(){document.getElementById(vid).textContent=this.value;rebuild();});
});
document.getElementById('sel-palette').addEventListener('change',rebuild);
document.getElementById('sel-shape').addEventListener('change',rebuild);
document.getElementById('btn-reset').addEventListener('click',()=>{document.getElementById('txt').value='BEAD';rebuild();});
document.getElementById('btn-export').addEventListener('click',exportPNG);
document.getElementById('btn-font').addEventListener('click',()=>document.getElementById('font-upload').click());
document.getElementById('btn-phys').addEventListener('click',function(){
  physicsOn=!physicsOn; this.textContent='physics '+(physicsOn?'●':'○');
  if(physicsOn) startPhysics(); else {if(animId){cancelAnimationFrame(animId);animId=null;}render();}
});
document.getElementById('font-upload').addEventListener('change',function(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{try{font=opentype.parse(ev.target.result);document.getElementById('font-name').textContent=file.name;rebuild();}catch(err){console.error(err);}};
  reader.readAsArrayBuffer(file);
});
canvas.addEventListener('click',()=>{ if(physicsOn) shake(); else {seed=Math.floor(Math.random()*99999);rebuild();} });

resize();
opentype.load(FONT_URL,(err,f)=>{if(!err){font=f;rebuild();}});
</script>
</body>
</html>
