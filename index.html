<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bead It</title>
<script src="https://cdn.jsdelivr.net/npm/opentype.js@1.3.4/dist/opentype.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #f0ece4; overflow: hidden; font-family: sans-serif; }
canvas { display: block; }
#ui {
  position: fixed; top: 20px; left: 50%;
  transform: translateX(-50%);
  display: flex; flex-direction: column; gap: 10px;
  align-items: center;
  background: rgba(255,255,255,0.75);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(0,0,0,0.1);
  border-radius: 16px;
  padding: 16px 20px;
  min-width: 280px;
  z-index: 100;
}
#ui input[type=text] {
  background: rgba(0,0,0,0.06);
  border: 1px solid rgba(0,0,0,0.15);
  color: #222; padding: 8px 12px;
  border-radius: 8px; font-size: 18px;
  width: 220px; outline: none;
  text-align: center; letter-spacing: 4px;
}
.row { display: flex; align-items: center; gap: 8px; color: rgba(0,0,0,0.5); font-size: 12px; width: 100%; }
.row input[type=range] { flex: 1; accent-color: #555; }
select { background: #fff; color: #222; border: 1px solid rgba(0,0,0,0.2); padding: 4px 8px; border-radius: 6px; font-size: 12px; }
button {
  background: rgba(0,0,0,0.07);
  border: 1px solid rgba(0,0,0,0.15);
  color: #222; padding: 7px 14px;
  border-radius: 8px; cursor: pointer; font-size: 12px;
}
button:hover { background: rgba(0,0,0,0.14); }
.btn-row { display: flex; gap: 8px; }
#hint {
  position: fixed; bottom: 20px; left: 50%;
  transform: translateX(-50%);
  color: rgba(0,0,0,0.3); font-size: 12px;
  pointer-events: none;
}
#font-name { color: rgba(0,0,0,0.35); font-size: 11px; text-align: center; }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="ui">
  <input type="text" id="txt" value="BEAD" maxlength="6">
  <div class="row">
    <span>size</span>
    <input type="range" id="sl-size" min="3" max="20" value="7">
    <span id="vl-size">7</span>
  </div>
  <div class="row">
    <span>spacing</span>
    <input type="range" id="sl-gap" min="0" max="8" value="2">
    <span id="vl-gap">2</span>
  </div>
  <div class="row">
    <span>palette</span>
    <select id="sel-palette">
      <option value="rainbow">rainbow</option>
      <option value="pastel">pastel</option>
      <option value="mono">mono</option>
      <option value="gold">gold</option>
      <option value="neon">neon</option>
    </select>
    <span>shape</span>
    <select id="sel-shape">
      <option value="mix">mix</option>
      <option value="circle">circle</option>
      <option value="diamond">diamond</option>
      <option value="star">star</option>
      <option value="hex">hex</option>
    </select>
  </div>
  <div class="btn-row">
    <button id="btn-reset">reset</button>
    <button id="btn-export">save ↓</button>
    <label style="cursor:pointer">
      <button as="span" onclick="this.parentElement.querySelector('input').click()">font ↑</button>
      <input type="file" id="font-upload" accept=".ttf,.otf,.woff,.woff2" style="display:none">
    </label>
  </div>
  <div id="font-name"></div>
</div>
<div id="hint">type to change text</div>

<script>
const FONT_URL = 'https://cdn.jsdelivr.net/npm/@fontsource/inter@5.0.8/files/inter-latin-900-normal.woff';

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H;
let font = null;
let beads = [];
let animFrame = null;
let shakeOffset = [];
let shakeT = 0;
let shaking = false;

// ── palettes ──────────────────────────────────────────────
const PALETTES = {
  rainbow: (i, n) => `hsl(${(i/n*360)},55%,58%)`,
  pastel:  (i, n) => `hsl(${(i/n*360)},40%,72%)`,
  mono:    (i, n) => `hsl(220,${15+i/n*25}%,${38+i/n*30}%)`,
  gold:    (i, n) => `hsl(${38+i/n*18},${70+i/n*20}%,${45+i/n*20}%)`,
  neon:    (i, n) => `hsl(${(i/n*360)},80%,55%)`
};

// ── resize ────────────────────────────────────────────────
function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  build();
}
window.addEventListener('resize', resize);

// ── path sampling ─────────────────────────────────────────
function samplePathCommands(cmds, spacing) {
  const pts = [];
  let cx = 0, cy = 0;
  let accumulated = 0;
  let firstPt = true;

  function addAlong(x0, y0, x1, y1) {
    const dx = x1 - x0, dy = y1 - y0;
    const len = Math.sqrt(dx*dx + dy*dy);
    if (len < 0.001) return;
    let t = firstPt ? 0 : (spacing - accumulated);
    while (t <= len) {
      pts.push({ x: x0 + dx*(t/len), y: y0 + dy*(t/len) });
      t += spacing;
      firstPt = false;
    }
    accumulated = len - (t - spacing);
  }

  function cubicBezierPts(x0,y0,x1,y1,x2,y2,x3,y3, steps) {
    const res = [];
    for (let i = 0; i <= steps; i++) {
      const t = i/steps;
      const mt = 1-t;
      res.push({
        x: mt*mt*mt*x0 + 3*mt*mt*t*x1 + 3*mt*t*t*x2 + t*t*t*x3,
        y: mt*mt*mt*y0 + 3*mt*mt*t*y1 + 3*mt*t*t*y2 + t*t*t*y3
      });
    }
    return res;
  }

  function quadBezierPts(x0,y0,x1,y1,x2,y2, steps) {
    const res = [];
    for (let i = 0; i <= steps; i++) {
      const t = i/steps;
      const mt = 1-t;
      res.push({
        x: mt*mt*x0 + 2*mt*t*x1 + t*t*x2,
        y: mt*mt*y0 + 2*mt*t*y1 + t*t*y2
      });
    }
    return res;
  }

  let startX = 0, startY = 0;
  for (const cmd of cmds) {
    if (cmd.type === 'M') {
      cx = cmd.x; cy = cmd.y;
      startX = cx; startY = cy;
      firstPt = true; accumulated = 0;
    } else if (cmd.type === 'L') {
      addAlong(cx, cy, cmd.x, cmd.y);
      cx = cmd.x; cy = cmd.y;
    } else if (cmd.type === 'C') {
      const steps = Math.max(8, Math.ceil(spacing * 2));
      const bpts = cubicBezierPts(cx,cy,cmd.x1,cmd.y1,cmd.x2,cmd.y2,cmd.x,cmd.y, steps);
      for (let i = 1; i < bpts.length; i++) addAlong(bpts[i-1].x,bpts[i-1].y,bpts[i].x,bpts[i].y);
      cx = cmd.x; cy = cmd.y;
    } else if (cmd.type === 'Q') {
      const steps = Math.max(8, Math.ceil(spacing * 2));
      const bpts = quadBezierPts(cx,cy,cmd.x1,cmd.y1,cmd.x,cmd.y, steps);
      for (let i = 1; i < bpts.length; i++) addAlong(bpts[i-1].x,bpts[i-1].y,bpts[i].x,bpts[i].y);
      cx = cmd.x; cy = cmd.y;
    } else if (cmd.type === 'Z') {
      addAlong(cx, cy, startX, startY);
      cx = startX; cy = startY;
    }
  }
  return pts;
}

// ── build beads from font path ────────────────────────────
function build() {
  if (animFrame) { cancelAnimationFrame(animFrame); animFrame = null; }

  const text    = document.getElementById('txt').value || 'BEAD';
  const beadR   = parseInt(document.getElementById('sl-size').value);
  const gap     = parseInt(document.getElementById('sl-gap').value);
  const palette = document.getElementById('sel-palette').value;
  const shape   = document.getElementById('sel-shape').value;
  const spacing = beadR * 2 + gap;

  let cmds = null;

  if (font) {
    const fontSize = Math.min(W, H) * 0.72;
    const path = font.getPath(text, 0, 0, fontSize);
    const bb = path.getBoundingBox();
    const tw = bb.x2 - bb.x1;
    const th = bb.y2 - bb.y1;
    const ox = (W - tw) / 2 - bb.x1;
    const oy = (H - th) / 2 - bb.y1;
    // offset commands
    cmds = path.commands.map(cmd => {
      const c = Object.assign({}, cmd);
      if ('x'  in c) c.x  += ox;
      if ('y'  in c) c.y  += oy;
      if ('x1' in c) c.x1 += ox;
      if ('y1' in c) c.y1 += oy;
      if ('x2' in c) c.x2 += ox;
      if ('y2' in c) c.y2 += oy;
      return c;
    });
  } else {
    // fallback: rasterize with canvas2d, trace outline points
    const ofc = document.createElement('canvas');
    ofc.width = W; ofc.height = H;
    const oCtx = ofc.getContext('2d');
    const fontSize = Math.min(W, H) * 0.65;
    oCtx.font = `900 ${fontSize}px Arial Black, Arial, sans-serif`;
    oCtx.textAlign = 'center';
    oCtx.textBaseline = 'middle';
    oCtx.fillStyle = '#fff';
    oCtx.fillText(text, W/2, H/2);
    // sample edge pixels
    const imgData = oCtx.getImageData(0, 0, W, H).data;
    const edgePts = [];
    for (let y = 0; y < H; y += Math.round(spacing)) {
      for (let x = 0; x < W; x++) {
        const idx = (y * W + x) * 4;
        if (imgData[idx+3] > 128) {
          // check if edge
          const left  = x > 0   ? imgData[(y*W+x-1)*4+3] : 0;
          const right = x < W-1 ? imgData[(y*W+x+1)*4+3] : 0;
          if (left < 128 || right < 128) edgePts.push({x, y});
        }
      }
    }
    for (let x = 0; x < W; x += Math.round(spacing)) {
      for (let y = 0; y < H; y++) {
        const idx = (y * W + x) * 4;
        if (imgData[idx+3] > 128) {
          const top    = y > 0   ? imgData[((y-1)*W+x)*4+3] : 0;
          const bottom = y < H-1 ? imgData[((y+1)*W+x)*4+3] : 0;
          if (top < 128 || bottom < 128) edgePts.push({x, y});
        }
      }
    }
    beads = edgePts.map((p, i) => ({
      x: p.x, y: p.y, r: beadR,
      color: PALETTES[palette](i, edgePts.length),
      shape: pickShape(shape, i)
    }));
    shakeOffset = beads.map(() => ({ x: 0, y: 0 }));
    render();
    return;
  }

  const pts = samplePathCommands(cmds, spacing);
  const n = pts.length;
  beads = pts.map((p, i) => ({
    x: p.x, y: p.y, r: beadR,
    color: PALETTES[palette](i, n),
    shape: pickShape(shape, i)
  }));
  shakeOffset = beads.map(() => ({ x: 0, y: 0 }));
  render();
}

function pickShape(mode, i) {
  if (mode !== 'mix') return mode;
  const shapes = ['circle', 'diamond', 'star', 'hex'];
  return shapes[i % shapes.length];
}

// ── draw single bead ──────────────────────────────────────
function drawBead(x, y, r, color, shape) {
  ctx.fillStyle = color;
  ctx.strokeStyle = 'rgba(255,255,255,0.35)';
  ctx.lineWidth = 0.8;

  if (shape === 'circle') {
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI*2);
    ctx.fill();
    ctx.stroke();
    // small specular
    ctx.beginPath();
    ctx.arc(x - r*0.3, y - r*0.3, r*0.28, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.fill();

  } else if (shape === 'diamond') {
    ctx.beginPath();
    ctx.moveTo(x,     y - r*1.2);
    ctx.lineTo(x + r, y);
    ctx.lineTo(x,     y + r*1.2);
    ctx.lineTo(x - r, y);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    // top face highlight
    ctx.beginPath();
    ctx.moveTo(x,       y - r*1.2);
    ctx.lineTo(x + r,   y);
    ctx.lineTo(x,       y - r*0.1);
    ctx.closePath();
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.fill();

  } else if (shape === 'star') {
    const spikes = 5;
    const outerR = r * 1.1;
    const innerR = r * 0.45;
    ctx.beginPath();
    for (let i = 0; i < spikes * 2; i++) {
      const angle = (i * Math.PI / spikes) - Math.PI / 2;
      const rad = i % 2 === 0 ? outerR : innerR;
      if (i === 0) ctx.moveTo(x + Math.cos(angle)*rad, y + Math.sin(angle)*rad);
      else ctx.lineTo(x + Math.cos(angle)*rad, y + Math.sin(angle)*rad);
    }
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

  } else if (shape === 'hex') {
    ctx.beginPath();
    for (let i = 0; i < 6; i++) {
      const a = (i / 6) * Math.PI * 2 - Math.PI / 6;
      if (i === 0) ctx.moveTo(x + Math.cos(a)*r, y + Math.sin(a)*r);
      else ctx.lineTo(x + Math.cos(a)*r, y + Math.sin(a)*r);
    }
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    // top-left face
    ctx.beginPath();
    ctx.moveTo(x, y);
    const a0 = -Math.PI/6, a1 = Math.PI/6;
    ctx.lineTo(x + Math.cos(a0)*r, y + Math.sin(a0)*r);
    ctx.lineTo(x + Math.cos(a1)*r, y + Math.sin(a1)*r);
    ctx.closePath();
    ctx.fillStyle = 'rgba(255,255,255,0.22)';
    ctx.fill();
  }
}

// ── render ────────────────────────────────────────────────
function render() {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#f0ece4';
  ctx.fillRect(0, 0, W, H);

  for (let i = 0; i < beads.length; i++) {
    const b = beads[i];
    const ox = shakeOffset[i] ? shakeOffset[i].x : 0;
    const oy = shakeOffset[i] ? shakeOffset[i].y : 0;
    drawBead(b.x + ox, b.y + oy, b.r, b.color, b.shape);
  }
}

// ── shake animation ───────────────────────────────────────
function shake() {
  if (shaking) return;
  shaking = true;
  shakeT = 0;
  const amp = beads[0] ? beads[0].r * 1.8 : 8;
  shakeOffset = beads.map(() => ({
    x: (Math.random()-0.5) * amp * 2,
    y: (Math.random()-0.5) * amp * 2
  }));

  function tick() {
    shakeT += 0.08;
    const decay = Math.max(0, 1 - shakeT);
    for (let i = 0; i < shakeOffset.length; i++) {
      shakeOffset[i].x *= 0.82;
      shakeOffset[i].y *= 0.82;
    }
    render();
    if (decay > 0.02) animFrame = requestAnimationFrame(tick);
    else { shaking = false; shakeOffset = beads.map(() => ({x:0,y:0})); render(); }
  }
  animFrame = requestAnimationFrame(tick);
}

// ── export ────────────────────────────────────────────────
function exportPNG() {
  const link = document.createElement('a');
  link.download = 'beadit.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}

// ── events ────────────────────────────────────────────────
document.getElementById('txt').addEventListener('input', build);
document.getElementById('sl-size').addEventListener('input', function() {
  document.getElementById('vl-size').textContent = this.value;
  build();
});
document.getElementById('sl-gap').addEventListener('input', function() {
  document.getElementById('vl-gap').textContent = this.value;
  build();
});
document.getElementById('sel-palette').addEventListener('change', build);
document.getElementById('sel-shape').addEventListener('change', build);
document.getElementById('btn-reset').addEventListener('click', function() {
  document.getElementById('txt').value = 'BEAD';
  build();
});
document.getElementById('btn-export').addEventListener('click', exportPNG);

document.getElementById('font-upload').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      font = opentype.parse(ev.target.result);
      document.getElementById('font-name').textContent = file.name;
      build();
    } catch(err) { console.error('font parse failed', err); }
  };
  reader.readAsArrayBuffer(file);
});

// shake on canvas click
canvas.addEventListener('click', shake);

// ── init ──────────────────────────────────────────────────
resize();
opentype.load(FONT_URL, function(err, f) {
  if (err) { console.warn('CDN font failed, using system font'); return; }
  font = f;
  build();
});
</script>
</body>
</html>
