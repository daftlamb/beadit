<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bead It</title>
<script src="https://cdn.jsdelivr.net/npm/opentype.js@1.3.4/dist/opentype.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #111; overflow: hidden; font-family: sans-serif; }
canvas { display: block; }
#ui {
  position: fixed; top: 20px; left: 50%;
  transform: translateX(-50%);
  display: flex; flex-direction: column; gap: 10px;
  align-items: center;
  background: rgba(30,30,30,0.82);
  backdrop-filter: blur(14px);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 16px;
  padding: 16px 20px;
  min-width: 280px;
  z-index: 100;
}
#ui input[type=text] {
  background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
  color: #eee; padding: 8px 12px; border-radius: 8px; font-size: 18px;
  width: 220px; outline: none; text-align: center; letter-spacing: 4px;
}
.row { display: flex; align-items: center; gap: 8px; color: rgba(255,255,255,0.45); font-size: 12px; width: 100%; }
.row input[type=range] { flex: 1; accent-color: #aaa; }
select { background: #222; color: #eee; border: 1px solid rgba(255,255,255,0.18); padding: 4px 8px; border-radius: 6px; font-size: 12px; }
button { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); color: #eee; padding: 7px 14px; border-radius: 8px; cursor: pointer; font-size: 12px; }
button:hover { background: rgba(255,255,255,0.16); }
.btn-row { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
#hint { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.2); font-size: 12px; pointer-events: none; }
#font-name { color: rgba(255,255,255,0.3); font-size: 11px; }
#warn { color: #e67e22; font-size: 11px; display: none; }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="ui">
  <input type="text" id="txt" value="BEAD" maxlength="8">
  <div class="row">
    <span>size</span>
    <input type="range" id="sl-size" min="8" max="48" value="18">
    <span id="vl-size">18</span>
  </div>
  <div class="row">
    <span>density</span>
    <input type="range" id="sl-density" min="1" max="10" value="5">
    <span id="vl-density">5</span>
  </div>
  <div class="row">
    <span>jitter</span>
    <input type="range" id="sl-jitter" min="0" max="14" value="4">
    <span id="vl-jitter">4</span>
  </div>
  <div class="row">
    <span>palette</span>
    <select id="sel-palette">
      <option value="marble">marble</option>
      <option value="ruby">ruby</option>
      <option value="jade">jade</option>
      <option value="amber">amber</option>
      <option value="galaxy">galaxy</option>
      <option value="crystal">crystal</option>
    </select>
    <span>physics</span>
    <select id="sel-phys">
      <option value="on">on</option>
      <option value="off">off</option>
    </select>
  </div>
  <div class="btn-row">
    <button id="btn-reset">reset</button>
    <button id="btn-export">save</button>
    <button id="btn-font">font</button>
    <input type="file" id="font-upload" accept=".ttf,.otf,.woff,.woff2" style="display:none">
  </div>
  <div id="warn">⚠ too many beads — increase size or lower density</div>
  <div id="font-name"></div>
</div>
<div id="hint">click to shake · tilt device to roll</div>
<script>
const FONT_URL = 'https://cdn.jsdelivr.net/npm/@fontsource/inter@5.0.8/files/inter-latin-900-normal.woff';
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H, font = null, seed = 42, animId = null;

// ── marble color palettes ─────────────────────────────────
const PALETTES = {
  marble:  () => { const h=[0,30,200,120,280,50][Math.floor(Math.random()*6)]; return {h,h2:h+40,s:65,l:52}; },
  ruby:    () => { const h=340+Math.random()*30; return {h,h2:h+20,s:80,l:48}; },
  jade:    () => { const h=130+Math.random()*40; return {h,h2:h+30,s:60,l:42}; },
  amber:   () => { const h=30+Math.random()*20; return {h,h2:h+25,s:85,l:50}; },
  galaxy:  () => { const h=220+Math.random()*80; return {h,h2:h+60,s:75,l:45}; },
  crystal: () => { const h=Math.random()*360; return {h,h2:h+50,s:55,l:65}; }
};

function sr(s) { const x=Math.sin(s+1)*43758.5453; return x-Math.floor(x); }

function resize() { W=canvas.width=window.innerWidth; H=canvas.height=window.innerHeight; rebuild(); }
window.addEventListener('resize', resize);

// ── rasterize ─────────────────────────────────────────────
function rasterize(text) {
  const ofc=document.createElement('canvas'); ofc.width=W; ofc.height=H;
  const oc=ofc.getContext('2d');
  const chars=Math.max(text.length,1);
  if (font) {
    let fs=Math.min(W*0.82/chars*1.5,H*0.62);
    const path=font.getPath(text,0,0,fs);
    const bb=path.getBoundingBox();
    const sc=Math.min((W*0.88)/(bb.x2-bb.x1),(H*0.65)/(bb.y2-bb.y1));
    fs*=sc;
    const p2=font.getPath(text,0,0,fs);
    const bb2=p2.getBoundingBox();
    const ox=(W-(bb2.x2-bb2.x1))/2-bb2.x1;
    const oy=(H-(bb2.y2-bb2.y1))/2-bb2.y1;
    const d=p2.commands.reduce((s,c)=>{
      if(c.type==='M') return s+`M${c.x+ox},${c.y+oy}`;
      if(c.type==='L') return s+`L${c.x+ox},${c.y+oy}`;
      if(c.type==='C') return s+`C${c.x1+ox},${c.y1+oy},${c.x2+ox},${c.y2+oy},${c.x+ox},${c.y+oy}`;
      if(c.type==='Q') return s+`Q${c.x1+ox},${c.y1+oy},${c.x+ox},${c.y+oy}`;
      if(c.type==='Z') return s+'Z'; return s;
    },'');
    oc.fillStyle='#fff'; oc.fill(new Path2D(d));
  } else {
    const fs=Math.min(W*0.75/chars*1.4,H*0.6);
    oc.font=`900 ${fs}px Arial Black,Arial,sans-serif`;
    oc.textAlign='center'; oc.textBaseline='middle';
    oc.fillStyle='#fff'; oc.fillText(text,W/2,H/2);
  }
  return oc.getImageData(0,0,W,H);
}

// ── Zhang-Suen skeleton SCALE=2 ───────────────────────────
function extractSkeleton(imgData, spacing) {
  const SW=imgData.width,SH=imgData.height,SC=2;
  const w=Math.ceil(SW/SC),h=Math.ceil(SH/SC);
  const data=imgData.data;
  const grid=new Uint8Array(w*h);
  for(let y=0;y<h;y++) for(let x=0;x<w;x++){
    const sx=Math.min(x*SC,SW-1),sy=Math.min(y*SC,SH-1);
    grid[y*w+x]=data[(sy*SW+sx)*4+3]>128?1:0;
  }
  function nb(x,y){return(x<0||y<0||x>=w||y>=h)?0:grid[y*w+x];}
  let changed=true;
  while(changed){
    changed=false;
    for(let pass=0;pass<2;pass++){
      const rem=[];
      for(let y=1;y<h-1;y++) for(let x=1;x<w-1;x++){
        if(!grid[y*w+x]) continue;
        const p2=nb(x,y-1),p3=nb(x+1,y-1),p4=nb(x+1,y),p5=nb(x+1,y+1),
              p6=nb(x,y+1),p7=nb(x-1,y+1),p8=nb(x-1,y),p9=nb(x-1,y-1);
        const B=p2+p3+p4+p5+p6+p7+p8+p9;
        if(B<2||B>6) continue;
        const A=(p2===0&&p3===1?1:0)+(p3===0&&p4===1?1:0)+(p4===0&&p5===1?1:0)+
                (p5===0&&p6===1?1:0)+(p6===0&&p7===1?1:0)+(p7===0&&p8===1?1:0)+
                (p8===0&&p9===1?1:0)+(p9===0&&p2===1?1:0);
        if(A!==1) continue;
        if(pass===0){if(p2*p4*p6!==0||p4*p6*p8!==0) continue;}
        else        {if(p2*p4*p8!==0||p2*p6*p8!==0) continue;}
        rem.push(y*w+x);
      }
      if(rem.length){changed=true;rem.forEach(i=>{grid[i]=0;});}
    }
  }
  const sp=Math.max(1,Math.round(spacing/SC));
  const pts=[];
  const used=new Uint8Array(w*h);
  for(let y=0;y<h;y++) for(let x=0;x<w;x++){
    if(!grid[y*w+x]||used[y*w+x]) continue;
    pts.push({x:x*SC+SC/2,y:y*SC+SC/2});
    for(let dy=-sp;dy<=sp;dy++) for(let dx=-sp;dx<=sp;dx++){
      const nx=x+dx,ny=y+dy;
      if(nx>=0&&ny>=0&&nx<w&&ny<h&&dx*dx+dy*dy<=sp*sp) used[ny*w+nx]=1;
    }
  }
  return pts;
}

// ── beads & physics ───────────────────────────────────────
let beads = [];
let gx = 0, gy = 0.35;

window.addEventListener('devicemotion', e => {
  const a = e.accelerationIncludingGravity;
  if (!a) return;
  gx = (a.x||0) * 0.045;
  gy = -(a.y||0) * 0.045;
});

function rebuild() {
  if (animId) { cancelAnimationFrame(animId); animId=null; }
  const text    = document.getElementById('txt').value||'BEAD';
  const beadR   = parseInt(document.getElementById('sl-size').value);
  const density = parseInt(document.getElementById('sl-density').value);
  const jitter  = parseInt(document.getElementById('sl-jitter').value);
  const palette = document.getElementById('sel-palette').value;
  const spacing = Math.max(beadR*2, beadR*(3.0-density*0.18));

  const imgData = rasterize(text);
  const pts = extractSkeleton(imgData, spacing);

  document.getElementById('warn').style.display = pts.length>300 ? 'block' : 'none';

  beads = pts.map((p,i) => {
    const angle = sr(seed+i*3)*Math.PI*2;
    const dist  = sr(seed+i*3+1)*jitter;
    const col   = PALETTES[palette]();
    // random swirl angle for marble pattern
    const swirl = sr(seed+i*13)*Math.PI*2;
    return {
      x: p.x+Math.cos(angle)*dist,
      y: p.y+Math.sin(angle)*dist,
      ox: p.x, oy: p.y,
      vx: 0, vy: 0,
      r: beadR,
      h: col.h, h2: col.h2, s: col.s, l: col.l,
      swirl
    };
  });

  const physOn = document.getElementById('sel-phys').value === 'on';
  if (physOn) startPhysics(); else render();
}

function startPhysics() {
  if (animId) cancelAnimationFrame(animId);
  function tick() {
    const damp=0.80, rest=0.010, bounce=0.42;
    for (const b of beads) {
      b.vx += gx + (b.ox-b.x)*rest;
      b.vy += gy + (b.oy-b.y)*rest;
      b.vx *= damp; b.vy *= damp;
      b.x += b.vx; b.y += b.vy;
      if(b.x-b.r<0){b.x=b.r;b.vx*=-bounce;}
      if(b.x+b.r>W){b.x=W-b.r;b.vx*=-bounce;}
      if(b.y-b.r<0){b.y=b.r;b.vy*=-bounce;}
      if(b.y+b.r>H){b.y=H-b.r;b.vy*=-bounce;}
    }
    // bead-bead repulsion
    for(let i=0;i<beads.length;i++) for(let j=i+1;j<beads.length;j++){
      const a=beads[i],b=beads[j];
      const dx=b.x-a.x,dy=b.y-a.y;
      const minD=(a.r+b.r)*0.92;
      const d2=dx*dx+dy*dy;
      if(d2<minD*minD&&d2>0.001){
        const d=Math.sqrt(d2),push=(minD-d)*0.22/d;
        a.vx-=dx*push;a.vy-=dy*push;
        b.vx+=dx*push;b.vy+=dy*push;
      }
    }
    render();
    animId=requestAnimationFrame(tick);
  }
  animId=requestAnimationFrame(tick);
}

// ── marble sphere render ──────────────────────────────────
function drawMarble(x, y, r, b) {
  // drop shadow on floor
  const shad = ctx.createRadialGradient(x+r*0.18, y+r*1.1, 0, x+r*0.18, y+r*1.1, r*1.0);
  shad.addColorStop(0,'rgba(0,0,0,0.55)');
  shad.addColorStop(1,'rgba(0,0,0,0)');
  ctx.beginPath(); ctx.ellipse(x+r*0.12, y+r*1.08, r*0.9, r*0.25, 0, 0, Math.PI*2);
  ctx.fillStyle=shad; ctx.fill();

  // base color
  const base = ctx.createRadialGradient(x-r*0.25, y-r*0.25, r*0.05, x, y, r);
  base.addColorStop(0, `hsl(${b.h},${b.s}%,${Math.min(100,b.l+22)}%)`);
  base.addColorStop(0.5, `hsl(${b.h},${b.s}%,${b.l}%)`);
  base.addColorStop(1,   `hsl(${b.h},${b.s}%,${Math.max(0,b.l-28)}%)`);
  ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
  ctx.fillStyle=base; ctx.fill();

  // marble swirl — inner color band
  ctx.save();
  ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.clip();
  const sw = ctx.createLinearGradient(
    x+Math.cos(b.swirl)*r*0.6, y+Math.sin(b.swirl)*r*0.6,
    x+Math.cos(b.swirl+Math.PI)*r*0.6, y+Math.sin(b.swirl+Math.PI)*r*0.6
  );
  sw.addColorStop(0,   `hsla(${b.h2},${b.s+10}%,${b.l+15}%,0)`);
  sw.addColorStop(0.35,`hsla(${b.h2},${b.s+10}%,${b.l+15}%,0.55)`);
  sw.addColorStop(0.5, `hsla(${b.h2},${b.s+10}%,${b.l+20}%,0.7)`);
  sw.addColorStop(0.65,`hsla(${b.h2},${b.s+10}%,${b.l+15}%,0.55)`);
  sw.addColorStop(1,   `hsla(${b.h2},${b.s+10}%,${b.l+15}%,0)`);
  ctx.fillStyle=sw; ctx.fillRect(x-r,y-r,r*2,r*2);
  ctx.restore();

  // inner translucency glow
  const glow = ctx.createRadialGradient(x+r*0.1,y+r*0.15,0,x,y,r*0.9);
  glow.addColorStop(0,`hsla(${b.h},${b.s-10}%,${b.l+35}%,0.4)`);
  glow.addColorStop(1,'rgba(0,0,0,0)');
  ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
  ctx.fillStyle=glow; ctx.fill();

  // primary specular — large soft
  const spec1 = ctx.createRadialGradient(x-r*0.35,y-r*0.38,0,x-r*0.3,y-r*0.3,r*0.55);
  spec1.addColorStop(0,'rgba(255,255,255,0.95)');
  spec1.addColorStop(0.35,'rgba(255,255,255,0.45)');
  spec1.addColorStop(1,'rgba(255,255,255,0)');
  ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
  ctx.fillStyle=spec1; ctx.fill();

  // secondary specular — small sharp
  ctx.beginPath(); ctx.arc(x-r*0.3,y-r*0.32,r*0.14,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0.98)'; ctx.fill();

  // bottom rim light
  const rim = ctx.createRadialGradient(x+r*0.3,y+r*0.55,0,x+r*0.3,y+r*0.55,r*0.5);
  rim.addColorStop(0,`hsla(${b.h},${b.s}%,${b.l+30}%,0.35)`);
  rim.addColorStop(1,'rgba(0,0,0,0)');
  ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
  ctx.fillStyle=rim; ctx.fill();
}

function render() {
  // dark background with subtle vignette
  ctx.fillStyle='#0e0e0e'; ctx.fillRect(0,0,W,H);
  const vig=ctx.createRadialGradient(W/2,H/2,H*0.3,W/2,H/2,H*0.85);
  vig.addColorStop(0,'rgba(0,0,0,0)');
  vig.addColorStop(1,'rgba(0,0,0,0.55)');
  ctx.fillStyle=vig; ctx.fillRect(0,0,W,H);

  for(const b of beads) drawMarble(b.x,b.y,b.r,b);
}

function shake() {
  beads.forEach(b=>{ b.vx+=(Math.random()-0.5)*14; b.vy+=(Math.random()-0.5)*14; });
}

function exportPNG() {
  const a=document.createElement('a'); a.download='beadit.png';
  a.href=canvas.toDataURL('image/png'); a.click();
}

// ── events ────────────────────────────────────────────────
document.getElementById('txt').addEventListener('input', rebuild);
[['sl-size','vl-size'],['sl-density','vl-density'],['sl-jitter','vl-jitter']].forEach(([sid,vid])=>{
  document.getElementById(sid).addEventListener('input',function(){
    document.getElementById(vid).textContent=this.value; rebuild();
  });
});
document.getElementById('sel-palette').addEventListener('change', rebuild);
document.getElementById('sel-phys').addEventListener('change', rebuild);
document.getElementById('btn-reset').addEventListener('click',()=>{ document.getElementById('txt').value='BEAD'; rebuild(); });
document.getElementById('btn-export').addEventListener('click', exportPNG);
document.getElementById('btn-font').addEventListener('click',()=>document.getElementById('font-upload').click());
document.getElementById('font-upload').addEventListener('change',function(e){
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{font=opentype.parse(ev.target.result);document.getElementById('font-name').textContent=file.name;rebuild();}
    catch(err){console.error('font parse failed',err);}
  };
  reader.readAsArrayBuffer(file);
});
canvas.addEventListener('click',()=>{
  if(document.getElementById('sel-phys').value==='on') shake();
  else { seed=Math.floor(Math.random()*99999); rebuild(); }
});

// ── init ──────────────────────────────────────────────────
resize();
opentype.load(FONT_URL,(err,f)=>{ if(!err){font=f;rebuild();} });
</script>
</body>
</html>
